version: "3.9"

services:
  api:
    build: ./api
    container_name: gudam-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/gudam
      - ALEMBIC_URL=postgresql://postgres:postgres@db:5432/gudam
      - REDIS_URL=redis://redis:6379/0
      - GLITCHTIP_DSN=http://glitchtip:8000/api/1/store/
    depends_on:
      - db
      - redis
      - glitchtip

  web:
    build: ./web
    container_name: gudam-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

  db:
    image: postgres:15
    container_name: gudam-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gudam 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gudam-redis

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: gudam-glitchtip
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: super-secret-key
      PORT: 8000
      EMAIL_URL: smtp://localhost

volumes:
  postgres_data: