version: "3.9"

services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  glitchtip:
    ports:
      - "8001:8000"
